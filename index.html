<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>刷卡记账</title>

  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icon.png">
  <link rel="stylesheet" href="./css/app.css">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="刷卡记账">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>

<body>
  <div class="page">
    <header class="header">
      <div class="eyebrow">建行 AMEX</div>
      <h1>刷卡记账</h1>
    </header>

    <section class="card">
      <label>金额</label>
      <div class="amount-box">
        <span>$</span>
        <input id="amount" type="number" step="0.01" inputmode="decimal" placeholder="0.00">
      </div>

      <label>日期</label>
      <button class="date-button" id="dateButton">选择日期</button>

      <label>类别</label>
      <select id="category">
        <option>🍜餐饮</option>
        <option>🛒买菜</option>
        <option>🚗交通</option>
        <option>🎮娱乐</option>
        <option>📄学习</option>
        <option>🏠房租</option>
        <option>🎁购物</option>
        <option>📦其他</option>
      </select>

      <label>备注</label>
      <input id="note" type="text" placeholder="午餐 麦当劳">

      <button class="primary" id="saveButton">保存记录</button>
      <button class="ghost hidden" id="cancelEditButton">取消编辑</button>
      <div class="msg" id="msg"></div>
    </section>

    <section class="card">
      <div class="section-title">设置</div>
      <label>账期开始日</label>
      <select id="billingStartDay"></select>
    </section>

    <section class="card">
      <div class="section-title">统计期间</div>
      <div class="period-row">
        <select id="yearSelect"></select>
        <select id="monthSelect"></select>
      </div>
    </section>

    <section class="stats">
      <div class="stat card">
        <div class="stat-title">自然月</div>
        <div class="stat-number blue" id="monthTotal">$0.00</div>
        <div class="stat-range" id="monthRange"></div>
      </div>
      <div class="stat card">
        <div class="stat-title">账期月</div>
        <div class="stat-number purple" id="cycleTotal">$0.00</div>
        <div class="stat-range" id="cycleRange"></div>
      </div>
      <div class="stat card">
        <div class="stat-title">自然年</div>
        <div class="stat-number green" id="yearTotal">$0.00</div>
        <div class="stat-range" id="yearRange"></div>
      </div>
    </section>

    <section class="records card">
      <div class="records-head">
        <span>账期记录</span>
        <button class="link" id="exportButton">导出CSV</button>
      </div>
      <div id="recordsList"></div>
    </section>
  </div>

  <div class="sheet-backdrop hidden" id="dateSheet">
    <div class="sheet">
      <div class="handle"></div>
      <div class="sheet-head">
        <button class="link" id="dateCancel">取消</button>
        <strong>选择日期</strong>
        <button class="link" id="dateDone">完成</button>
      </div>
      <div class="date-grid">
        <select id="dateYear"></select>
        <select id="dateMonth"></select>
        <select id="dateDay"></select>
      </div>
      <button class="ghost" id="todayButton">今天</button>
    </div>
  </div>

  <script src="./js/db.js"></script>
  <script src="./js/app.js"></script>
</body>
</html>
