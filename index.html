<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>刷卡记账</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icon.png">
  <link rel="stylesheet" href="./css/app.css">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="刷卡记账">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#000000">
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <div class="topbar-stack">
        <button id="accountButton" class="account-pill" type="button">建行 AMEX</button>
        <button id="profileButton" class="profile-button" type="button" aria-label="个人账户">
          <span aria-hidden="true">●</span>
        </button>
      </div>
    </header>

    <section class="stats-row" aria-label="统计">
      <article class="stat-card">
        <div class="stat-title">当前账期</div>
        <div class="stat-number purple" id="cycleTotal">$0.00</div>
        <div class="stat-range" id="cycleRange">--</div>
      </article>
      <article class="stat-card">
        <div class="stat-title">自然月</div>
        <div class="stat-number blue" id="monthTotal">$0.00</div>
        <div class="stat-range" id="monthRange">--</div>
      </article>
      <article class="stat-card">
        <div class="stat-title">自然年</div>
        <div class="stat-number green" id="yearTotal">$0.00</div>
        <div class="stat-range" id="yearRange">--</div>
      </article>
    </section>

    <section class="records-section">
      <div class="section-head">
        <h1>账单记录</h1>
        <button id="refreshButton" class="text-button" type="button">刷新</button>
      </div>
      <div class="records-card" id="recordsList"></div>
    </section>
  </main>


  <section class="analytics-page hidden" id="analyticsPage" aria-label="年度消费分析">
    <header class="analytics-nav">
      <button id="analyticsBack" class="analytics-nav-button back" type="button" aria-label="返回">‹</button>
      <div class="analytics-nav-title">
        <strong>年度分析</strong>
        <span id="analyticsYearLabel">2026 年</span>
      </div>
      <button id="analyticsExport" class="analytics-nav-button more" type="button" aria-label="导出 CSV">•••</button>
    </header>

    <div class="analytics-scroll">
      <section class="analytics-hero">
        <span>今年总支出</span>
        <strong id="analyticsYearTotal">$0.00</strong>
        <small id="analyticsYearCompare">1–12 月</small>
      </section>

      <section class="analytics-card trend-card">
        <div class="analytics-card-head">
          <div>
            <span>月度趋势</span>
            <strong>每月消费</strong>
          </div>
          <span class="analytics-badge" id="analyticsPeakLabel">暂无数据</span>
        </div>
        <div class="trend-chart" id="trendChart"></div>
      </section>

      <section class="analytics-card category-card">
        <div class="analytics-card-head">
          <div>
            <span>类别占比</span>
            <strong>消费去向</strong>
          </div>
        </div>
        <div class="category-breakdown" id="categoryBreakdown"></div>
      </section>
    </div>
  </section>

  <nav class="bottom-bar" aria-label="底部操作">
    <button id="billingButton" class="bottom-action" type="button">
      <span class="action-icon">◷</span>
      <span>
        <strong>账期</strong>
        <small id="billingLabel">16日开始</small>
      </span>
    </button>

    <button id="addButton" class="fab" type="button" aria-label="新增花销">+</button>

    <button id="analysisButton" class="bottom-action right" type="button">
      <span class="action-icon analysis-dock-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" role="img"><path d="M4 18V10M10 18V6M16 18v-4M3 18h18"/></svg>
      </span>
      <span>
        <strong>消费分析</strong>
        <small>年度趋势</small>
      </span>
    </button>
  </nav>

  <div class="toast" id="toast"></div>

  <div class="sheet-backdrop hidden" id="expenseSheet">
    <section class="sheet expense-sheet">
      <div class="handle"></div>
      <div class="sheet-head">
        <button class="link" id="expenseCancel" type="button">取消</button>
        <strong id="sheetTitle">新增花销</strong>
        <button class="link" id="expenseDone" type="button">保存</button>
      </div>

      <label>金额</label>
      <div class="amount-box">
        <span>$</span>
        <input id="amount" type="number" step="0.01" inputmode="decimal" placeholder="0.00">
      </div>

      <label>日期</label>
      <button class="selector-button" id="dateButton" type="button">选择日期</button>

      <label>类别</label>
      <select id="category">
        <option>🍜餐饮</option>
        <option>🛒买菜</option>
        <option>🚗交通</option>
        <option>🎮娱乐</option>
        <option>📄学习</option>
        <option>🏠房租</option>
        <option>🎁购物</option>
        <option>📦其他</option>
      </select>

      <label>备注</label>
      <input id="note" type="text" placeholder="午餐 麦当劳">

      <button id="deleteEditingButton" class="delete-button hidden" type="button">删除这条记录</button>
    </section>
  </div>

  <div class="sheet-backdrop hidden" id="dateSheet">
    <section class="sheet">
      <div class="handle"></div>
      <div class="sheet-head">
        <button class="link" id="dateCancel" type="button">取消</button>
        <strong>选择日期</strong>
        <button class="link" id="dateDone" type="button">完成</button>
      </div>
      <div class="date-grid">
        <select id="dateYear"></select>
        <select id="dateMonth"></select>
        <select id="dateDay"></select>
      </div>
      <button class="ghost" id="todayButton" type="button">今天</button>
    </section>
  </div>

  <div class="sheet-backdrop hidden" id="billingSheet">
    <section class="sheet">
      <div class="handle"></div>
      <div class="sheet-head">
        <button class="link" id="billingCancel" type="button">取消</button>
        <strong>账期设置 / 查看</strong>
        <button class="link" id="billingDone" type="button">完成</button>
      </div>
      <label>账期开始日</label>
      <select id="billingStartDay"></select>

      <label>查看账期</label>
      <div class="billing-view-grid">
        <select id="viewYear"></select>
        <select id="viewMonth"></select>
      </div>
      <div class="billing-preview" id="billingPreview">--</div>
    </section>
  </div>

  <div class="sheet-backdrop hidden" id="authSheet">
    <section class="sheet auth-sheet">
      <div class="handle"></div>
      <div class="sheet-head">
        <button class="link" id="authCancel" type="button">关闭</button>
        <strong>云端同步</strong>
        <span class="sheet-spacer"></span>
      </div>
      <div class="auth-icon">◉</div>
      <p class="auth-message" id="authMessage">使用你的 Google Account 登录，账单会在后台安全同步。</p>
      <button class="google-button" id="authGoogle" type="button">
        <span class="google-mark">G</span>
        <span>使用 Google 登录</span>
      </button>
      <button class="secondary-sheet-button hidden" id="authRetrySync" type="button">重新同步</button>
      <button class="delete-button hidden" id="authSignOut" type="button">退出登录</button>
      <p class="auth-hint" id="authHint">仅允许指定的个人 Google Account 使用此应用。</p>
    </section>
  </div>

  <div class="sheet-backdrop hidden" id="accountSheet">
    <section class="sheet">
      <div class="handle"></div>
      <div class="sheet-head">
        <button class="link" id="accountCancel" type="button">取消</button>
        <strong>账户名称</strong>
        <button class="link" id="accountDone" type="button">完成</button>
      </div>
      <input id="accountNameInput" type="text" placeholder="建行 AMEX">
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./js/config.js"></script>
  <script src="./js/db.js"></script>
  <script src="./js/cloud.js"></script>
  <script src="./js/app.js"></script>
</body>
</html>
